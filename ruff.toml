line-length = 120

lint.select = [
  "E",   # pycodestyle
  "F",   # pyflakes
  "I",   # isort
]

lint.ignore = [
    "E741",  # Ambiguous variable name: `l`
]

[lint.per-file-ignores]
"__init__.py" = [
    # <module> imported but unused
    "F401",
]
"tests/*" = [
    # Line too long
    "E501",
]
